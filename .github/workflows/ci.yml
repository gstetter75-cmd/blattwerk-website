name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Output Tests
        run: npm test
        env:
          # Run again after build to include build-output tests
          FORCE_COLOR: 1
