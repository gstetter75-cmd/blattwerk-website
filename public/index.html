<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlattWerk e.V. – Weiterleitung</title>
  <script>
    var lang = navigator.language && navigator.language.startsWith('en') ? 'en' : 'de';
    var base = location.pathname.replace(/\/+$/, '');
    window.location.replace(base + '/' + lang + '/');
  </script>
  <meta http-equiv="refresh" content="1; url=./de/" />
</head>
<body>
  <p><a href="./de/">Deutsch</a> | <a href="./en/">English</a></p>
</body>
</html>
